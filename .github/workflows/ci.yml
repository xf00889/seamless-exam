name: Backend Tests (paths-filtered)

on:
  push:
    branches:
      - master
      - develop
    paths:
      - '**/*.py'
      - 'requirements.txt'
      - 'users/migrations/**'
      - 'exams/migrations/**'
      - '*/migrations/**'
      - 'manage.py'
      - 'services/**'
      - 'repositories/**'
      - 'exam_system/**'
  pull_request:
    branches:
      - master
      - develop
    paths:
      - '**/*.py'
      - 'requirements.txt'
      - 'users/migrations/**'
      - 'exams/migrations/**'
      - '*/migrations/**'
      - 'manage.py'
      - 'services/**'
      - 'repositories/**'
      - 'exam_system/**'

jobs:
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: exam_system_db
          MYSQL_USER: root
          MYSQL_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DJANGO_SETTINGS_MODULE: exam_system.settings
      DB_HOST: 127.0.0.1
      DB_NAME: exam_system_db
      DB_USER: root
      DB_PASSWORD: root
      DB_PORT: 3306
      DEBUG: "False"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system packages for MySQL client
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Django checks
        run: python manage.py check
      - name: Run Django tests
        run: python manage.py test
