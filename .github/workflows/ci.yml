name: CI

on:
  pull_request:
    branches:
      - main
      - master
      - develop
  push:
    branches:
      - main
      - master
      - develop

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci --prefix theme/static_src

      - name: Build Tailwind CSS assets
        run: npm --prefix theme/static_src run build

  backend-test:
    runs-on: ubuntu-latest
    needs: frontend-build
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: exam_system_db
          MYSQL_USER: exam_admin
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DJANGO_SETTINGS_MODULE: exam_system.settings
      DB_HOST: 127.0.0.1
      DB_NAME: exam_system_db
      DB_USER: root
      DB_PASSWORD: root
      DB_PORT: 3306
      DEBUG: "False"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system packages for MySQL client
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django checks
        run: python manage.py check

      - name: Run Django tests
        run: python manage.py test
