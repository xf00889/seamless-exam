databases:
  - name: exammaker-db
    plan: free
    databaseName: exammaker
    user: exammaker_user

services:
  - type: web
    name: localexammaker
    runtime: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn exam_system.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exammaker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: exam_system.settings_production
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: GOOGLE_DRIVE_CLIENT_ID
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DRIVE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: CRON_SECRET_TOKEN
        sync: false
