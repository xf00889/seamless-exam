<footer class="app-footer mt-auto w-full">
    <div class="app-footer-inner">
        <div class="app-footer-row">
            <p class="app-footer-copy">
                &copy; {% now "Y" %} ValuateAI. All rights reserved.
            </p>
            <p class="app-footer-meta">
                <span>Developed by:</span>
                <span class="app-footer-author">&lt;toto/&gt;</span>
                <svg class="app-footer-spark" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                </svg>
            </p>
            {% if app_version %}
            <p class="app-footer-version" title="System version">
                <span class="app-footer-version-label">System version</span>
                <span class="app-footer-version-value">v{{ app_version }}</span>
            </p>
            {% endif %}
        </div>
        {% if footer_links %}
        <div class="app-footer-links">
            {% for link in footer_links %}
            <a href="{{ link.url }}" class="app-footer-link">
                {{ link.label }}
            </a>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</footer>
