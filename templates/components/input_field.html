<div class="form-field mb-4">
    {% if type != 'checkbox' %}
    <label for="{{ name }}" class="block text-sm font-medium text-gray-700 mb-2">
        {{ label }}
        {% if required %}
        <span class="text-red-500">*</span>
        {% endif %}
    </label>
    {% endif %}
    
    {% if type == 'textarea' %}
    <textarea 
        name="{{ name }}" 
        id="{{ name }}"
        {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
        {% if required %}required{% endif %}
        class="w-full px-3 py-2 border {% if error %}border-red-500{% else %}border-gray-300{% endif %} rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        rows="{{ rows|default:3 }}"
    >{{ value|default:'' }}</textarea>
    {% elif type == 'select' %}
    <select 
        name="{{ name }}" 
        id="{{ name }}"
        {% if required %}required{% endif %}
        class="w-full px-3 py-2 border {% if error %}border-red-500{% else %}border-gray-300{% endif %} rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
    >
        {% if placeholder %}
        <option value="">{{ placeholder }}</option>
        {% endif %}
        {% for option in options %}
            {% if option.value %}
            <option value="{{ option.value }}" {% if value == option.value %}selected{% endif %}>{{ option.label }}</option>
            {% else %}
            <option value="{{ option }}" {% if value == option %}selected{% endif %}>{{ option }}</option>
            {% endif %}
        {% endfor %}
    </select>
    {% elif type == 'checkbox' %}
    <div class="flex items-center">
        <input 
            type="checkbox" 
            name="{{ name }}" 
            id="{{ name }}"
            {% if value %}checked{% endif %}
            class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded"
        >
        <label for="{{ name }}" class="ml-2 block text-sm text-gray-900">
            {{ label }}
            {% if required %}
            <span class="text-red-500">*</span>
            {% endif %}
        </label>
    </div>
    {% else %}
    <input 
        type="{{ type|default:'text' }}" 
        name="{{ name }}" 
        id="{{ name }}"
        value="{{ value|default:'' }}"
        {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
        {% if required %}required{% endif %}
        {% if min %}min="{{ min }}"{% endif %}
        {% if max %}max="{{ max }}"{% endif %}
        {% if step %}step="{{ step }}"{% endif %}
        class="w-full px-3 py-2 border {% if error %}border-red-500{% else %}border-gray-300{% endif %} rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
    >
    {% endif %}
    
    {% if help_text %}
    <p class="mt-1 text-sm text-gray-500">{{ help_text }}</p>
    {% endif %}
    
    {% if error %}
    <p class="mt-1 text-sm text-red-600">{{ error }}</p>
    {% endif %}
</div>
