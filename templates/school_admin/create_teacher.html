{% extends 'school_admin/base.html' %}

{% block title %}Add Teacher{% endblock %}

{% block content %}
<nav style="margin-bottom:1.5rem;">
    <a href="{% url 'school_admin_teachers' %}" style="color:var(--text-muted); text-decoration:none; font-size:0.875rem;">
        &larr; Back to Teachers
    </a>
</nav>

<div class="sa-header">
    <div>
        <h1>Add Teacher</h1>
        <p>Create a new teacher account</p>
    </div>
</div>

<div class="sa-card" style="max-width:560px;">
    <div class="sa-card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="sa-form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" required>
            </div>
            <div class="sa-form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" required>
            </div>
            <div class="sa-form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="sa-form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="sa-form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="8">
            </div>
            <div class="sa-form-group">
                <label for="password_confirm">Confirm Password</label>
                <input type="password" id="password_confirm" name="password_confirm" required minlength="8">
            </div>
            <div class="sa-form-group">
                <label for="department">Department</label>
                <input type="text" id="department" name="department">
            </div>
            <div style="display:flex; gap:0.75rem; margin-top:1.5rem;">
                <button type="submit" class="sa-btn sa-btn-blue">Create Teacher</button>
                <a href="{% url 'school_admin_teachers' %}" class="sa-btn sa-btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
