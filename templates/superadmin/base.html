{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Super Admin{% endblock %} - Seamless</title>
    <link rel="icon" type="image/png" href="{% static 'img/brand.png' %}">
    <link rel="stylesheet" href="{% static 'css/sweetalert2.min.css' %}">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

        .sa-layout { display: flex; min-height: 100vh; }

        .sa-sidebar { width: 260px; background: #1e293b; border-right: 1px solid #334155; padding: 1.5rem 0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 50; transition: transform 0.3s; }
        .sa-sidebar-brand { padding: 0 1.5rem 1.5rem; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 0.75rem; }
        .sa-sidebar-brand img { width: 36px; height: 36px; border-radius: 8px; }
        .sa-sidebar-brand h2 { font-size: 1.125rem; font-weight: 700; color: #f1f5f9; }
        .sa-sidebar-brand span { font-size: 0.6875rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }

        .sa-nav { flex: 1; padding: 1rem 0; }
        .sa-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; color: #94a3b8; text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
        .sa-nav a:hover { color: #e2e8f0; background: #334155; }
        .sa-nav a.active { color: #60a5fa; background: rgba(96, 165, 250, 0.1); border-left-color: #60a5fa; }
        .sa-nav a svg { width: 20px; height: 20px; flex-shrink: 0; }

        .sa-sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid #334155; }
        .sa-sidebar-footer form button { width: 100%; padding: 0.625rem 1rem; background: #dc2626; color: white; border: none; border-radius: 6px; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        .sa-sidebar-footer form button:hover { background: #b91c1c; }

        .sa-main { flex: 1; margin-left: 260px; padding: 2rem; }
        .sa-header { margin-bottom: 2rem; }
        .sa-header h1 { font-size: 1.75rem; font-weight: 700; color: #f1f5f9; }
        .sa-header p { color: #94a3b8; margin-top: 0.25rem; }

        .sa-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .sa-stat { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem; }
        .sa-stat-label { font-size: 0.75rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .sa-stat-value { font-size: 2rem; font-weight: 700; margin-top: 0.25rem; }
        .sa-stat-sub { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }
        .text-blue { color: #60a5fa; }
        .text-green { color: #34d399; }
        .text-purple { color: #a78bfa; }
        .text-orange { color: #fb923c; }
        .text-cyan { color: #22d3ee; }
        .text-rose { color: #fb7185; }

        .sa-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; }
        .sa-card-header { padding: 1rem 1.5rem; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .sa-card-header h3 { font-size: 1rem; font-weight: 600; color: #f1f5f9; }
        .sa-card-body { padding: 1.5rem; }

        .sa-table-wrap { overflow-x: auto; }
        .sa-table { width: 100%; border-collapse: collapse; }
        .sa-table th { padding: 0.75rem 1rem; text-align: left; font-size: 0.75rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #334155; }
        .sa-table td { padding: 0.75rem 1rem; font-size: 0.875rem; color: #e2e8f0; border-bottom: 1px solid #1e293b; }
        .sa-table tr:hover td { background: #334155; }

        .sa-badge { display: inline-flex; align-items: center; padding: 0.25rem 0.625rem; border-radius: 9999px; font-size: 0.6875rem; font-weight: 600; }
        .sa-badge-blue { background: rgba(96, 165, 250, 0.15); color: #60a5fa; }
        .sa-badge-green { background: rgba(52, 211, 153, 0.15); color: #34d399; }
        .sa-badge-purple { background: rgba(167, 139, 250, 0.15); color: #a78bfa; }

        .sa-btn { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.8125rem; font-weight: 500; text-decoration: none; border: none; cursor: pointer; transition: all 0.2s; }
        .sa-btn-sm { padding: 0.375rem 0.75rem; font-size: 0.75rem; }
        .sa-btn-blue { background: #2563eb; color: white; }
        .sa-btn-blue:hover { background: #1d4ed8; }
        .sa-btn-red { background: #dc2626; color: white; }
        .sa-btn-red:hover { background: #b91c1c; }
        .sa-btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
        .sa-btn-ghost:hover { background: #334155; color: #e2e8f0; }

        .sa-form-group { margin-bottom: 1rem; }
        .sa-form-group label { display: block; font-size: 0.8125rem; font-weight: 500; color: #94a3b8; margin-bottom: 0.375rem; }
        .sa-form-group input, .sa-form-group select { width: 100%; padding: 0.625rem 0.875rem; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 0.875rem; transition: border-color 0.2s; }
        .sa-form-group input:focus, .sa-form-group select:focus { outline: none; border-color: #60a5fa; }

        .sa-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
        .sa-modal-overlay.active { display: flex; }
        .sa-modal { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 420px; }
        .sa-modal h3 { font-size: 1.125rem; font-weight: 600; color: #f1f5f9; margin-bottom: 1rem; }
        .sa-modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }

        .sa-alert { padding: 0.875rem 1rem; border-radius: 8px; font-size: 0.875rem; margin-bottom: 1rem; }
        .sa-alert-error { background: rgba(220, 38, 38, 0.15); color: #fca5a5; border: 1px solid rgba(220, 38, 38, 0.3); }
        .sa-alert-success { background: rgba(34, 197, 94, 0.15); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.3); }

        .sa-search { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }
        .sa-search input { flex: 1; padding: 0.625rem 0.875rem; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 0.875rem; }
        .sa-search input:focus { outline: none; border-color: #60a5fa; }

        .sa-pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }
        .sa-pagination a, .sa-pagination span { padding: 0.5rem 0.875rem; border-radius: 6px; font-size: 0.8125rem; text-decoration: none; }
        .sa-pagination a { background: #334155; color: #e2e8f0; }
        .sa-pagination a:hover { background: #475569; }
        .sa-pagination .current { background: #2563eb; color: white; }

        .sa-mobile-toggle { display: none; position: fixed; top: 1rem; left: 1rem; z-index: 60; padding: 0.5rem; background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; cursor: pointer; }
        .sa-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }

        @media (max-width: 768px) {
            .sa-sidebar { transform: translateX(-100%); }
            .sa-sidebar.open { transform: translateX(0); }
            .sa-main { margin-left: 0; padding: 1rem; padding-top: 4rem; }
            .sa-mobile-toggle { display: block; }
            .sa-overlay.open { display: block; }
            .sa-stats { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 480px) {
            .sa-stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <button class="sa-mobile-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">
        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="sa-overlay" id="sa-overlay" onclick="toggleSidebar()"></div>

    <div class="sa-layout">
        <aside class="sa-sidebar" id="sa-sidebar">
            <div class="sa-sidebar-brand">
                <img src="{% static 'img/brand.png' %}" alt="Logo">
                <div>
                    <h2>Seamless</h2>
                    <span>Super Admin</span>
                </div>
            </div>
            <nav class="sa-nav">
                <a href="{% url 'superadmin_dashboard' %}" class="{% if request.resolver_match.url_name == 'superadmin_dashboard' %}active{% endif %}">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    Dashboard
                </a>
                <a href="{% url 'superadmin_teachers' %}" class="{% if request.resolver_match.url_name == 'superadmin_teachers' %}active{% endif %}">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                    Teachers
                </a>
                <a href="{% url 'superadmin_students' %}" class="{% if request.resolver_match.url_name == 'superadmin_students' %}active{% endif %}">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    Students
                </a>
            </nav>
            <div class="sa-sidebar-footer">
                <form method="post" action="{% url 'superadmin_logout' %}">
                    {% csrf_token %}
                    <button type="submit">Logout</button>
                </form>
            </div>
        </aside>

        <main class="sa-main">
            {% if messages %}
            {% for message in messages %}
            <div class="sa-alert {% if message.tags == 'error' %}sa-alert-error{% else %}sa-alert-success{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{% static 'js/sweetalert2.min.js' %}"></script>
    <script>
    function toggleSidebar() {
        document.getElementById('sa-sidebar').classList.toggle('open');
        document.getElementById('sa-overlay').classList.toggle('open');
    }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
