{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Login - Seamless</title>
    <link rel="icon" type="image/png" href="{% static 'img/brand.png' %}">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .login-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 360px; }
        .login-brand { text-align: center; margin-bottom: 1.25rem; }
        .login-brand img { width: 40px; height: 40px; border-radius: 10px; margin-bottom: 0.75rem; }
        .login-brand h1 { font-size: 1.25rem; font-weight: 700; color: #f1f5f9; }
        .login-brand p { font-size: 0.75rem; color: #94a3b8; margin-top: 0.25rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8125rem; font-weight: 500; color: #94a3b8; margin-bottom: 0.375rem; }
        .form-group input { width: 100%; padding: 0.625rem 0.75rem; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.9375rem; }
        .form-group input:focus { outline: none; border-color: #60a5fa; }
        .btn-submit { width: 100%; padding: 0.75rem; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 0.9375rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
        .btn-submit:hover { background: #1d4ed8; }
        .alert { padding: 0.625rem 0.75rem; border-radius: 8px; font-size: 0.8125rem; margin-bottom: 1rem; background: rgba(220, 38, 38, 0.15); color: #fca5a5; border: 1px solid rgba(220, 38, 38, 0.3); }
        .login-footer { text-align: center; margin-top: 1rem; }
        .login-footer a { color: #60a5fa; text-decoration: none; font-size: 0.8125rem; }
        .login-footer a:hover { text-decoration: underline; }
        .btn-submit:focus-visible, .form-group input:focus-visible { outline: 2px solid #60a5fa; outline-offset: 2px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <img src="{% static 'img/brand.png' %}" alt="Logo">
            <h1>Super Admin</h1>
            <p>System Administration Panel</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'superadmin_login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter admin username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter password">
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <div class="login-footer">
            <a href="{% url 'home' %}">Back to home</a>
        </div>
    </div>
</body>
</html>
