{% extends "base.html" %}

{% block content %}
{% include 'components/breadcrumb.html' with breadcrumbs=page_breadcrumbs %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">{{ page_title }}</h1>
    
    <div class="bg-white shadow rounded-lg p-6">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Change Password</button>
        </form>
    </div>
</div>
{% endblock %}
