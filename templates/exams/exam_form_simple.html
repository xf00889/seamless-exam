{% extends 'base.html' %}
{% load static %}

{% block title %}Create Exam{% endblock %}

{% block content %}
<div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-900">Create New Exam</h2>
</div>

<div class="bg-white shadow-xl rounded-xl p-8 border border-gray-100">
    <form method="post" action="{% url 'exam_create' %}" id="examForm">
        {% csrf_token %}
        
        <div class="mb-4">
            <label for="title" class="block text-sm font-medium text-gray-700 mb-2">
                Exam Title <span class="text-red-500">*</span>
            </label>
            <input 
                type="text" 
                name="title" 
                id="title" 
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"
                required
            >
        </div>
        
        <div class="mb-4">
            <label for="duration_minutes" class="block text-sm font-medium text-gray-700 mb-2">
                Duration (minutes) <span class="text-red-500">*</span>
            </label>
            <input 
                type="number" 
                name="duration_minutes" 
                id="duration_minutes" 
                min="1"
                max="480"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"
                required
            >
            <p class="mt-1 text-sm text-gray-500">Maximum 8 hours (480 minutes)</p>
        </div>
        
        <!-- Navigation Buttons -->
        <div class="flex justify-between mt-8 pt-6 border-t border-gray-200">
            <div>
                <button 
                    type="button" 
                    id="prevBtn"
                    class="inline-flex items-center px-6 py-3 border border-gray-300 rounded-lg text-gray-700 font-semibold hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 hidden"
                >
                    Previous
                </button>
            </div>
            <div class="flex space-x-3">
                <button 
                    type="button" 
                    id="nextBtn"
                    class="inline-flex items-center px-8 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold rounded-lg hover:from-blue-700 hover:to-indigo-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                >
                    Next Step
                </button>
                <button 
                    type="submit" 
                    id="submitBtn"
                    class="inline-flex items-center px-8 py-3 bg-gradient-to-r from-green-600 to-emerald-600 text-white font-bold rounded-lg hover:from-green-700 hover:to-emerald-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 hidden"
                >
                    Create Exam
                </button>
            </div>
        </div>
    </form>
</div>

{% endblock %}

{% block extra_js %}
<script src="{% static 'js/pages/exam-form.js' %}"></script>

<!-- Exam Form Configuration Data -->
{{ exam_config|json_script:"exam-config-data" }}

<script>
// Pass exam form configuration to JavaScript using JSON data
document.addEventListener('DOMContentLoaded', function() {
    // Load exam configuration and apply to form handler
    JsonDataLoader.applyConfiguration('exam-config-data', window.ExamFormHandler);
});
</script>
{% endblock %}
